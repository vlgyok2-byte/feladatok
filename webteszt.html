<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Webteszt</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --background: #f4f4f9;
        }

        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-color: var(--background);
        }

        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--secondary);
        }

        #timer {
            text-align:center;
            font-size:20px;
            margin-bottom:15px;
            color:#d9534f;
        }

        .question-box {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        #results {
            margin-top: 20px;
            display: none;
        }

        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            border-left: 5px solid #28a745;
        }

        .wrong {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
        }

        .score {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

let selectedQuestions = [];
let timeLeft = 180;
let timerInterval;
let quizFinished = false;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startTimer() {
    const timerDisplay = document.getElementById("timer");

    timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = `Idő: ${timeLeft} mp`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            evaluateQuiz();
        }
    }, 1000);
}

function startQuiz() {
    const container = document.getElementById('quiz-content');
    container.innerHTML = "";

    const copy = [...allQuestions];
    shuffle(copy);

    selectedQuestions = copy.slice(0, 20);

    selectedQuestions.forEach((item, index) => {
        container.innerHTML += `
            <div class="question-box">
                <p><strong>${index + 1}. ${item.q}</strong></p>
                <input type="text" id="ans-${index}" placeholder="Írd ide a választ...">
            </div>
        `;
    });

    startTimer();
}

function evaluateQuiz() {
    if (quizFinished) return;
    quizFinished = true;

    clearInterval(timerInterval);

    let score = 0;
    let resultsHtml = "";

    selectedQuestions.forEach((item, index) => {
        const userAns = document.getElementById(`ans-${index}`).value.trim().toLowerCase();
        const correctAns = item.a.toLowerCase();

        const isCorrect = (userAns === correctAns);
        if (isCorrect) score++;

        resultsHtml += `
            <div class="result-item ${isCorrect ? 'correct' : 'wrong'}">
                <strong>${index + 1}. Kérdés:</strong> ${item.q}<br>
                Válaszod: ${userAns || "üres"}<br>
                Helyes válasz: ${item.a}
            </div>
        `;
    });

    const percent = Math.round((score / selectedQuestions.length) * 100);

    document.getElementById('quiz-content').style.display = "none";
    document.getElementById('submit-btn').style.display = "none";
    document.getElementById('timer').style.display = "none";

    document.getElementById('results').style.display = "block";
    document.getElementById('score-display').innerText =
        `Találatok: ${score} / ${selectedQuestions.length} (${percent}%)`;

    document.getElementById('answers-list').innerHTML = resultsHtml;
}

window.onload = startQuiz;
</script>
