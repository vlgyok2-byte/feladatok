<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Interaktív Python oktató – Robot parancsok</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; }
.container { max-width: 900px; margin:auto; }
.card { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:20px; }
h1,h2 { color:#2c3e50; }
button { margin:5px; padding:10px 15px; border:none; border-radius:8px; cursor:pointer; }
.correct { background:#2ecc71; color:white; }
.wrong { background:#e74c3c; color:white; }
.next { background:#3498db; color:white; }
pre { background:#1e1e1e; color:#dcdcdc; padding:15px; border-radius:10px; }
.hidden { display:none; }
.explanation { margin-top:15px; padding:10px; background:#ecf0f1; border-radius:8px; }
</style>
</head>
<body>
<div class="container">

<h1>Robot parancsok – interaktív tanulás</h1>
<p>Építsük fel együtt a programot lépésről lépésre!</p>

<div id="quiz" class="card"></div>

<div id="result" class="card hidden">
<h2>Kész program 🎉</h2>
<pre id="code"></pre>
</div>

</div>

<script>

const steps = [
{
q: "Hogyan kérjük be a robot parancsait?",
options: [
"input()",
"szo = input(\"Kérem a robot parancsait:  (E,D,K,N)\")",
"print(input())"
],
correct: 1,
explanation: "Az input() függvénnyel kérünk be adatot, és eltároljuk a szo változóban.",
wrong: [
"Azért hibás, mert nem mentjük el a bevitt adatot.",
"Azért hibás, mert a print nem bemenetet kér."
],
code: "szo = input(\"Kérem a robot parancsait:  (E,D,K,N)\")\n"
},
{
q: "Hogyan számoljuk meg az 'E' betűket?",
options: [
"szo.find(\"E\")",
"szo.count(\"E\")",
"len(szo)"
],
correct: 1,
explanation: "A count() megszámolja, hányszor szerepel egy karakter.",
wrong: [
"Azért hibás, mert a find csak az első helyet adja meg.",
"Azért hibás, mert ez az összes karakter számát adja."
],
code: "e = szo.count(\"E\")\n"
},
{
q: "Hogyan számoljuk meg az összes többi irányt?",
options: [
"d = szo.count(\"D\") stb.",
"csak egy változó kell",
"for ciklussal"
],
correct: 0,
explanation: "Minden irányhoz külön count() hívás kell.",
wrong: [
"Azért hibás, mert külön kell kezelni őket.",
"Azért hibás, mert itt egyszerűbb a count()."
],
code: "d = szo.count(\"D\")\nk = szo.count(\"K\")\nn = szo.count(\"N\")\n"
},
{
q: "Mit jelent az, hogy e > d?",
options: [
"Több észak mint dél",
"Több E mint D",
"Egyenlőek"
],
correct: 1,
explanation: "Összehasonlítjuk a két irány darabszámát.",
wrong: [
"Azért hibás, mert nem az irány jelentését nézzük.",
"Azért hibás, mert itt nem egyenlőséget vizsgálunk."
],
code: ""
},
{
q: "Mi történik, ha több az E mint a D?",
options: [
"vert = \"E\" * (e - d)",
"vert = e + d",
"vert = \"D\""
],
correct: 0,
explanation: "A különbséget ismételjük meg 'E' betűvel.",
wrong: [
"Azért hibás, mert nem számolunk különbséget.",
"Azért hibás, mert rossz irányt választ."
],
code: "if e > d:\n    vert = \"E\" * (e - d)\nelse:\n    vert = \"D\" * (d - e)\n"
},
{
q: "Hogyan készül a vízszintes irány?",
options: [
"horiz = vert",
"horiz = \"K\" vagy \"N\" ismételve",
"nem kell"
],
correct: 1,
explanation: "Ugyanúgy számoljuk, mint a függőlegeset.",
wrong: [
"Azért hibás, mert külön változó kell.",
"Azért hibás, mert szükséges a vízszintes irány is."
],
code: "if k > n:\n    horiz = \"K\" * (k - n)\nelse:\n    horiz = \"N\" * (n - k)\n"
},
{
q: "Hogyan kapjuk meg a végső parancsot?",
options: [
"lr = vert + horiz",
"lr = vert",
"lr = horiz"
],
correct: 0,
explanation: "Összefűzzük a két irányt.",
wrong: [
"Azért hibás, mert hiányzik a másik irány.",
"Azért hibás, mert hiányzik a másik irány."
],
code: "lr = vert + horiz\n"
},
{
q: "Hogyan írjuk ki az eredményt?",
options: [
"print(lr)",
"print(\"Egy ... út parancsszava:\", lr)",
"input(lr)"
],
correct: 1,
explanation: "A print kiírja a szöveget és a változót.",
wrong: [
"Azért hibás, mert nincs magyarázó szöveg.",
"Azért hibás, mert az input nem kiírásra való."
],
code: "print(\"Egy ... út parancsszava:\", lr)\n"
}
];

let current = 0;
let finalCode = "";

function loadQuestion() {
const q = steps[current];
const quizDiv = document.getElementById("quiz");
quizDiv.innerHTML = `<h2>${q.q}</h2>`;

q.options.forEach((opt, index) => {
const btn = document.createElement("button");
btn.innerText = opt;
btn.onclick = () => checkAnswer(index, btn);
quizDiv.appendChild(btn);
});
}

function checkAnswer(index, btn) {
const q = steps[current];

if (index === q.correct) {
btn.classList.add("correct");
finalCode += q.code;

const expl = document.createElement("div");
expl.className = "explanation";
expl.innerText = "✔ " + q.explanation;
document.getElementById("quiz").appendChild(expl);

const nextBtn = document.createElement("button");
nextBtn.innerText = "Következő";
nextBtn.className = "next";
nextBtn.onclick = () => {
current++;
if (current < steps.length) loadQuestion();
else showResult();
};

document.getElementById("quiz").appendChild(nextBtn);

} else {
btn.classList.add("wrong");

const wrongExpl = document.createElement("div");
wrongExpl.className = "explanation";
wrongExpl.innerText = "✖ " + q.wrong[index];
document.getElementById("quiz").appendChild(wrongExpl);
}
}

function showResult() {
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("code").innerText = finalCode;
}

loadQuestion();

</script>

</body>
</html>
